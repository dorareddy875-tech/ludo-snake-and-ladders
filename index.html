<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classic Board Games Hub</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #eef2f3; margin: 0; display: flex; height: 100vh; }
        #sidebar { width: 250px; background: #2c3e50; color: white; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .btn { background: #34495e; color: white; border: none; padding: 12px; cursor: pointer; border-radius: 5px; font-weight: bold; transition: 0.3s; }
        .btn:hover, .btn.active { background: #1abc9c; }
        #game-container { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        #board-wrapper { position: relative; background: white; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-radius: 8px; overflow: hidden; }
        canvas { display: block; background: #fdfdfd; }
        #controls { margin-top: 20px; display: flex; gap: 20px; align-items: center; background: white; padding: 15px 30px; border-radius: 5px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        #dice-view { font-size: 24px; font-weight: bold; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border: 2px solid #333; border-radius: 8px; }
        #status { font-weight: bold; color: #333; }
    </style>
</head>
<body>

    <div id="sidebar">
        <h2>🎮 Game Hub</h2>
        <button class="btn active" onclick="switchGame('snakes')">🐍 Snakes & Ladders</button>
        <button class="btn" onclick="switchGame('ludo')">👑 Ludo Engine</button>
        <hr style="width:100%; border-color: #455a64;">
        <div id="status">Player 1's Turn</div>
    </div>

    <div id="game-container">
        <div id="board-wrapper">
            <canvas id="gameBoard" width="600" height="600"></canvas>
        </div>
        <div id="controls">
            <button class="btn" style="background:#e74c3c" onclick="triggerDiceRoll()">🎲 Roll Dice</button>
            <div id="dice-view">-</div>
        </div>
    </div>

    <script src="snakes.js"></script>
    <script src="ludo.js"></script>
    <script src="main.js"></script>
</body>
</html>
